<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مقياس الاتزان الرقمي</title>
    <style>
        :root { --pink: #fce4ec; --blue: #e3f2fd; --accent: #2196f3; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--pink), var(--blue)); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; position: relative; }
        .q-box { background: #fafafa; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-right: 5px solid #f06292; }
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .score-val { font-weight: bold; color: var(--accent); float: left; background: #e3f2fd; padding: 2px 8px; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; }
        #timer { position: sticky; top: 0; background: #ff5252; color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; z-index: 100; }
        #result { display: none; margin-top: 20px; text-align: center; border: 3px solid var(--accent); padding: 30px; border-radius: 15px; background: #fff; }
        .status-msg { font-size: 1.4rem; margin-top: 15px; font-weight: bold; }
        #already-submitted { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div id="main-container" class="card">
    <div id="already-submitted">
        <h2>عذراً! ✋</h2>
        <p>لقد شاركت في هذه الجولة مسبقاً. انتظر تعليمات المهندسة لبدء جولة جديدة.</p>
    </div>

    <div id="quiz-ui">
        <div id="timer">الوقت المتبقي: 02:00</div>
        <h1>مقياس الاتزان الرقمي</h1>
        <div id="quiz"></div>
        <button id="submitBtn" onclick="submitData()">إظهار نتيجتي</button>
        
        <div id="result">
            <h2 id="scoreDisplay"></h2>
            <div id="msgDisplay" class="status-msg"></div>
            <p style="color: #95a5a6; font-size: 0.8rem; margin-top: 20px;">تم تسجيل ردك في قاعدة البيانات.</p>
        </div>
    </div>
</div>

<script>
    // --- جزء التحكم الخاص بالمهندسة ---
    // إذا أردتِ إعادة التجربة للطلاب، غيري الرقم "1" إلى "2" وهكذا..
    const currentExperimentVersion = "1"; 
    // ---------------------------------

    const storageKey = 'digital_scale_v' + currentExperimentVersion;

    if (localStorage.getItem(storageKey)) {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('already-submitted').style.display = 'block';
    }

    const questions = [
        "صعوبة التركيز لأكثر من 10 دقائق؟", "وجود 'ضبابية' في عقلك؟", "سرعة الشعور بالملل؟",
        "الغرق في 'التمرير اللانهائي'؟", "استخدام لغة 'الميمز' في الواقع؟", "الهروب من المهام الجادة؟",
        "القلق عند الجلوس في الهدوء؟", "ملل الهوايات التقليدية؟", "ضجيج المحتوى قبل النوم؟"
    ];

    const container = document.getElementById('quiz');
    questions.forEach((q, i) => {
        container.innerHTML += `
            <div class="q-box">
                <span class="score-val" id="val-${i}">5</span>
                <label>${i+1}. ${q}</label>
                <input type="range" class="val" min="0" max="10" value="5" oninput="updateVal(${i}, this.value)">
            </div>`;
    });

    function updateVal(id, value) { document.getElementById(`val-${id}`).innerText = value; }

    let timeLeft = 120;
    const countdown = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = `الوقت المتبقي: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) { clearInterval(countdown); submitData(true); }
    }, 1000);

    function submitData(isAuto = false) {
        if (localStorage.getItem(storageKey)) return;
        clearInterval(countdown);

        const scores = Array.from(document.querySelectorAll('.val')).map(i => parseInt(i.value));
        const totalRaw = scores.reduce((a, b) => a + b, 0);
        const finalScore = parseFloat(((totalRaw / 90) * 4).toFixed(1));
        
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('timer').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
        document.getElementById('scoreDisplay').innerText = `نتيجتك: ${finalScore} من 4`;
        
        let msg = ""; let color = "";
        if(finalScore <= 1.5) { msg = "✅ ممتاز! أنت مسيطر."; color = "#2ecc71"; }
        else if(finalScore <= 2.8) { msg = "⚠️ متوسط. انتبه لتشتتك."; color = "#f39c12"; }
        else { msg = "🚨 سيء! تحتاج ديتوكس رقمي."; color = "#e74c3c"; }
        
        const msgDiv = document.getElementById('msgDisplay');
        msgDiv.innerHTML = msg; msgDiv.style.color = color;

        // منع الطالب من الإرسال في هذا الإصدار تحديداً
        localStorage.setItem(storageKey, 'true');

        const formURL = "https://docs.google.com/forms/u/0/d/1uMzal_sKtqnh6wqEXXLLZYrU_SAGKLYKvno7LAGmv8ws/formResponse";
        const data = new FormData();
        data.append("entry.609466321", finalScore);
        fetch(formURL, { method: "POST", mode: "no-cors", body: data });
    }
</script>
</body>
</html>
